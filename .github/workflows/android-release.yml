name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          secret_count=0
          for value in "$ANDROID_KEYSTORE_BASE64" "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" "$ANDROID_KEY_PASSWORD"; do
            if [ -n "$value" ]; then
              secret_count=$((secret_count + 1))
            fi
          done
          if [ "$secret_count" -ne 0 ] && [ "$secret_count" -ne 4 ]; then
            echo "Configure all Android signing secrets, or none to use the repo-local sideload key." >&2
            exit 1
          fi
          if [ "$secret_count" -eq 4 ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          else
            echo "Using repo-local sideload signing key."
          fi
      - name: Build release artifacts
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          signing_args=()
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            signing_args+=("-PRELEASE_STORE_FILE=release.keystore")
            signing_args+=("-PRELEASE_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD")
            signing_args+=("-PRELEASE_KEY_ALIAS=$ANDROID_KEY_ALIAS")
            signing_args+=("-PRELEASE_KEY_PASSWORD=$ANDROID_KEY_PASSWORD")
          fi
          ./gradlew assembleRelease bundleRelease "${signing_args[@]}"
      - name: Verify release APK signature
        run: |
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$apksigner_path" verify --verbose --print-certs app/build/outputs/apk/release/*.apk
      - name: Prepare release files
        run: |
          version="${GITHUB_REF_NAME:-manual}"
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/WafuStudyShield-${version}-sideload.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release-artifacts/WafuStudyShield-${version}.aab"
          (cd release-artifacts && sha256sum * > SHA256SUMS.txt)
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wafustudyshield-release
          path: release-artifacts/*
          if-no-files-found: error
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
