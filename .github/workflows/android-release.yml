name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          fi
      - name: Build release artifacts
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          signing_args=()
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            signing_args+=("-PRELEASE_STORE_FILE=release.keystore")
            signing_args+=("-PRELEASE_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD")
            signing_args+=("-PRELEASE_KEY_ALIAS=$ANDROID_KEY_ALIAS")
            signing_args+=("-PRELEASE_KEY_PASSWORD=$ANDROID_KEY_PASSWORD")
          fi
          ./gradlew assembleRelease bundleRelease "${signing_args[@]}"
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wafustudyshield-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
